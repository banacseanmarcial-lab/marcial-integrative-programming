<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout -🌍 World Explorer Hub </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      animation: float 25s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Navigation */
    nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 1rem 2rem;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    nav h2 {
      color: #4f46e5;
      font-size: 1.8rem;
      font-weight: 700;
      display: inline-block;
      margin-right: 2rem;
    }

    nav h2 i {
      margin-right: 0.5rem;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 2rem;
      float: right;
    }

    nav a {
      text-decoration: none;
      color: #64748b;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 25px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    nav a:hover {
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.1);
      transform: translateY(-2px);
    }

    /* Main Container */
    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      margin-top: 100px;
      position: relative;
      z-index: 10;
    }

    /* Logout Box */
    .logout-box {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      padding: 4rem 3rem;
      width: 100%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 35px 80px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(50px);
      }
      60% {
        opacity: 1;
        transform: scale(1.05);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .logout-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #ef4444, #dc2626, #b91c1c);
      border-radius: 32px 32px 0 0;
    }

    .logout-icon {
      font-size: 5rem;
      color: #ef4444;
      margin-bottom: 2rem;
      animation: pulse 2s infinite;
      filter: drop-shadow(0 10px 20px rgba(239, 68, 68, 0.3));
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .logout-box h1 {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #1f2937, #374151);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      font-weight: 800;
    }

    .logout-box p {
      color: #6b7280;
      font-size: 1.3rem;
      line-height: 1.6;
      margin-bottom: 3rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 1.25rem 2.5rem;
      border: none;
      border-radius: 25px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 180px;
      justify-content: center;
    }

    .btn-logout {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 15px 35px rgba(239, 68, 68, 0.4);
    }

    .btn-logout:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 50px rgba(239, 68, 68, 0.6);
    }

    .btn-stay {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
    }

    .btn-stay:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.2));
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    /* Button shimmer effect */
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.6s;
    }

    .btn:hover::before {
      left: 100%;
    }

    /* Toggle Link */
    .toggle-link {
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      padding-top: 2rem;
    }

    .toggle-link a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }

    .toggle-link a:hover {
      color: #3730a3;
      text-shadow: 0 0 10px rgba(79, 70, 229, 0.5);
    }

    /* Footer */
    footer {
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(20px);
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      padding: 1.5rem;
      margin-top: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav ul {
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      nav h2 {
        display: block;
        text-align: center;
        margin-bottom: 1rem;
        margin-right: 0;
      }
      
      nav ul {
        float: none;
      }
      
      .container {
        padding: 1rem;
        margin-top: 120px;
      }
      
      .logout-box {
        padding: 3rem 2rem;
        margin: 1rem;
      }
      
      .logout-box h1 {
        font-size: 2.2rem;
      }
      
      .button-group {
        flex-direction: column;
        align-items: center;
      }
      
      .btn {
        width: 100%;
        max-width: 280px;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <!-- Navigation Bar -->
  <nav>
    <h2><i class="fas fa-eye"></i> SeanTech Vision</h2>
    <ul>
      <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
      <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
      <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
      <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
    </ul>
  </nav>

  <!-- Logout Confirmation -->
  <div class="container">
    <div class="logout-box">
      <div class="logout-icon">
        <i class="fas fa-sign-out-alt"></i>
      </div>
      
      <h1>Logout Confirmation</h1>
      <p>Are you sure you want to logout? You'll need to sign in again to access your dashboard and data.</p>
      
      <div class="button-group">
        <button class="btn btn-logout" onclick="handleLogout()">
          <i class="fas fa-check"></i>
          Yes, Logout
        </button>
        <button class="btn btn-stay" onclick="cancelLogout()">
          <i class="fas fa-times"></i>
          Stay Logged In
        </button>
      </div>
      
      <div class="toggle-link">
        <p>or <a href="profile.html">← Return to Dashboard</a></p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <i class="fas fa-shield-alt"></i>
    © 2026 SeanTech Vision. All rights reserved. | Secure Session Management
  </footer>

  <script>
    // Create floating particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 70; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = particle.style.height = (Math.random() * 12 + 4) + 'px';
        particle.style.animationDelay = Math.random() * 25 + 's';
        particle.style.animationDuration = (Math.random() * 30 + 30) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Logout handler with loading animation
    function handleLogout() {
      const logoutBtn = document.querySelector('.btn-logout');
      const originalText = logoutBtn.innerHTML;
      
      logoutBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging Out...';
      logoutBtn.disabled = true;
      
      // Simulate logout process
      setTimeout(() => {
        // Success animation
        logoutBtn.innerHTML = '<i class="fas fa-check"></i> Redirecting...';
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1000);
      }, 1500);
    }

    // Cancel logout
    function cancelLogout() {
      // Smooth redirect with animation
      document.querySelector('.logout-box').style.transform = 'scale(0.95)';
      document.querySelector('.logout-box').style.opacity = '0';
      
      setTimeout(() => {
        window.location.href = 'profile.html';
      }, 300);
    }

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('nav');
      if (window.scrollY > 50) {
        nav.style.background = 'rgba(255, 255, 255, 0.98)';
        nav.style.boxShadow = '0 10px 40px rgba(0, 0, 0, 0.15)';
      } else {
        nav.style.background = 'rgba(255, 255, 255, 0.95)';
        nav.style.boxShadow = '0 8px 32px rgba(0, 0, 0, 0.1)';
      }
    });

    // Add hover scale effect to logout box
    document.querySelector('.logout-box').addEventListener('mouseenter', function() {
      this.style.transform = 'translateY(-5px)';
    });

    document.querySelector('.logout-box').addEventListener('mouseleave', function() {
      this.style.transform = 'translateY(0)';
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      
      // Add confetti effect on page load (subtle)
      setTimeout(() => {
        document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 30%, #667eea 70%, #764ba2 100%)';
      }, 1000);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        const logoutBtn = document.querySelector('.btn-logout');
        if (document.activeElement === logoutBtn || logoutBtn.matches(':hover')) {
          handleLogout();
        }
      }
      
      if (e.key === 'Escape') {
        cancelLogout();
      }
    });
  </script>
</body>
</html>
