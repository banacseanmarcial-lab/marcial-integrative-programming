<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👤 Login - 🌍 World Explorer Hub </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Auth Container */
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      z-index: 10;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Auth Card */
    .auth-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      padding: 3.5rem 3rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 35px 80px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899);
      border-radius: 32px 32px 0 0;
    }

    /* Logo/Header */
    .logo {
      text-align: center;
      margin-bottom: 1rem;
    }

    .logo h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .logo p {
      color: #6b7280;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }

    /* Form */
    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      position: relative;
      animation: slideInLeft 0.6s ease-out;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .form-group label {
      position: absolute;
      top: 1rem;
      left: 1.5rem;
      color: #9ca3af;
      font-weight: 500;
      transition: all 0.3s ease;
      pointer-events: none;
      font-size: 1rem;
    }

    .form-group input {
      width: 100%;
      padding: 1.5rem 1.5rem 1.5rem 3rem;
      border: 2px solid rgba(79, 70, 229, 0.2);
      border-radius: 20px;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-family: inherit;
      color: #1f2937;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      background: white;
      transform: translateY(-2px);
    }

    .form-group input:focus + label,
    .form-group input:not(:placeholder-shown) + label {
      top: 0.5rem;
      left: 1.25rem;
      font-size: 0.85rem;
      color: #4f46e5;
      background: white;
      padding: 0 0.5rem;
      border-radius: 8px;
    }

    .form-group input::placeholder {
      color: transparent;
    }

    /* Submit Button */
    button[type="submit"] {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      padding: 1.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 1rem;
      animation: slideInLeft 0.6s ease-out 0.3s both;
    }

    button[type="submit"]:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 50px rgba(79, 70, 229, 0.6);
    }

    button[type="submit"]:hover::before {
      transform: scaleX(1);
    }

    button[type="submit"]::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    button[type="submit"]:active {
      transform: translateY(-2px);
    }

    /* Auth Links */
    .auth-links {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-top: 2rem;
      text-align: center;
    }

    .auth-links a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
      padding: 1rem 2rem;
      border-radius: 16px;
      transition: all 0.3s ease;
      background: rgba(79, 70, 229, 0.05);
      border: 2px solid rgba(79, 70, 229, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .auth-links a:hover {
      background: rgba(79, 70, 229, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
    }

    /* Success/Error Messages */
    .message {
      padding: 1.5rem;
      border-radius: 16px;
      margin: 1.5rem 0;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 0.75rem;
    }

    .success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        padding: 2.5rem 2rem;
        margin: 1rem;
      }
      
      .logo h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <h1><i class="fas fa-eye"></i> SeanTech Vision</h1>
        <p>Sign in to access your dashboard and manage your account</p>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <input type="email" id="email" placeholder=" " required>
          <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
        </div>
        
        <div class="form-group">
          <input type="password" id="password" placeholder=" " required>
          <label for="password"><i class="fas fa-lock"></i> Password</label>
        </div>

        <div id="messageContainer"></div>

        <button type="submit">
          <i class="fas fa-sign-in-alt"></i>
          Sign In
        </button>
      </form>

      <div class="auth-links">
        <a href="signup.html">
          <i class="fas fa-user-plus"></i>
          Don't have an account? Create one
        </a>
        <a href="index.html">
          <i class="fas fa-arrow-left"></i>
          Back to Home
        </a>
      </div>
    </div>
  </div>

  <script>
    // Create floating particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 60; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = particle.style.height = (Math.random() * 8 + 3) + 'px';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (Math.random() * 25 + 25) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Form handling with loading states
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Validation
      if (!email || !password) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      if (!email.includes('@')) {
        showMessage('Please enter a valid email address', 'error');
        return;
      }

      // Show loading state
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
      submitBtn.disabled = true;

      // Simulate API call
      try {
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        // Success
        showMessage('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'profile.html';
        }, 1500);
        
      } catch (error) {
        showMessage('Invalid credentials. Please try again.', 'error');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    // Show message function
    function showMessage(text, type) {
      const container = document.getElementById('messageContainer');
      container.innerHTML = `
        <div class="message ${type}">
          <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
          ${text}
        </div>
      `;
      
      setTimeout(() => {
        container.innerHTML = '';
      }, 5000);
    }

    // Input focus animations
    document.querySelectorAll('.form-group input').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.02)';
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
      });
    });

    // Enter key navigation
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }
    });

    // Initialize particles
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
    });

    // Password visibility toggle (bonus feature)
    const passwordField = document.getElementById('password');
    passwordField.insertAdjacentHTML('afterend', `
      <i class="fas fa-eye toggle-password" style="
        position: absolute;
        right: 1.5rem;
        top: 2.8rem;
        color: #9ca3af;
        cursor: pointer;
        z-index: 10;
        transition: color 0.3s ease;
      "></i>
    `);

    const togglePassword = document.querySelector('.toggle-password');
    let passwordVisible = false;

    togglePassword.addEventListener('click', () => {
      passwordVisible = !passwordVisible;
      passwordField.type = passwordVisible ? 'text' : 'password';
      togglePassword.style.color = passwordVisible ? '#4f46e5' : '#9ca3af';
      togglePassword.className = passwordVisible ? 'fas fa-eye-slash' : 'fas fa-eye';
    });
  </script>
</body>
</html>
