<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - 🌍 World Explorer Hub </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Navigation */
    nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 1rem 2rem;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    nav h2 {
      color: #4f46e5;
      font-size: 1.8rem;
      font-weight: 700;
      display: inline-block;
      margin-right: 2rem;
    }

    nav h2 i { margin-right: 0.5rem; }

    nav ul {
      display: flex;
      list-style: none;
      gap: 2rem;
      float: right;
    }

    nav a {
      text-decoration: none;
      color: #64748b;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 25px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    nav a:hover {
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.1);
      transform: translateY(-2px);
    }

    nav a[style*="color: #ff6b6b"] {
      color: #ff6b6b !important;
      background: rgba(255, 107, 107, 0.1);
      font-weight: 700;
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
    }

    /* Container */
    .container {
      margin-top: 120px;
      padding: 2rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      font-size: 1.1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .cta-btn:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.2));
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    /* Search & Filters */
    .table-controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      align-items: center;
      animation: fadeInUp 1s ease-out 0.2s both;
    }

    .search-box {
      flex: 1;
      min-width: 300px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 1rem 1.5rem 1rem 3rem;
      border: 2px solid rgba(79, 70, 229, 0.2);
      border-radius: 25px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .search-box input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      transform: translateY(-2px);
    }

    .search-box i {
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
    }

    /* Data Table Section */
    .data-table-section {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: fadeInUp 1s ease-out 0.4s both;
      overflow: hidden;
    }

    .data-table-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899, #f59e0b);
    }

    /* Table Styles */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    th {
      text-align: left;
      padding: 1.5rem 1rem;
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(124, 58, 237, 0.1));
      color: #1f2937;
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 3px solid rgba(79, 70, 229, 0.2);
    }

    td {
      padding: 1.5rem 1rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      vertical-align: middle;
    }

    tr {
      transition: all 0.3s ease;
      position: relative;
    }

    tr:hover {
      background: rgba(79, 70, 229, 0.05);
      transform: scale(1.01);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      margin-right: 1rem;
    }

    .role-badge {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .role-user { background: rgba(34, 197, 94, 0.2); color: #059669; }
    .role-admin { background: rgba(239, 68, 68, 0.2); color: #dc2626; }
    .role-moderator { background: rgba(59, 130, 246, 0.2); color: #2563eb; }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .btn-edit {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    .btn-edit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 1.5rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 1.5rem;
        text-align: center;
      }
      
      .table-controls {
        flex-direction: column;
      }
      
      .search-box {
        min-width: 100%;
      }
      
      th, td {
        padding: 1rem 0.5rem;
        font-size: 0.9rem;
      }
      
      .action-buttons {
        flex-direction: column;
        gap: 0.25rem;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <!-- Navigation Bar -->
  <nav>
    <h2><i class="fas fa-eye"></i> SeanTech Vision</h2>
    <ul>
      <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
      <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
      <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
      <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
      <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      <li><a href="admin.html" style="color: #ff6b6b; font-weight: bold;"><i class="fas fa-crown"></i> Admin</a></li>
    </ul>
  </nav>

  <div class="container">
    <header>
      <h1><i class="fas fa-users-cog"></i> Manage Users</h1>
      <a href="admin.html" class="cta-btn">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>
    </header>

    <!-- Stats Overview -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number">127</div>
        <div style="color: #6b7280; font-weight: 600;">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="-webkit-text-fill-color: #10b981;">12</div>
        <div style="color: #6b7280; font-weight: 600;">Admins</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="-webkit-text-fill-color: #f59e0b;">115</div>
        <div style="color: #6b7280; font-weight: 600;">Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="-webkit-text-fill-color: #ef4444;">0</div>
        <div style="color: #6b7280; font-weight: 600;">Pending</div>
      </div>
    </div>

    <!-- Table Controls -->
    <div class="table-controls">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search users by name or email..." id="searchInput">
      </div>
      <select style="padding: 1rem 1.5rem; border: 2px solid rgba(79, 70, 229, 0.2); border-radius: 25px; background: rgba(255, 255, 255, 0.9); font-size: 1rem;">
        <option>All Roles</option>
        <option>Admin</option>
        <option>User</option>
        <option>Moderator</option>
      </select>
      <a href="add-user.html" class="cta-btn" style="padding: 1rem 2rem; font-size: 1rem;">
        <i class="fas fa-plus"></i> Add New User
      </a>
    </div>

    <section class="data-table-section">
      <table>
        <thead>
          <tr>
            <th><i class="fas fa-hashtag"></i> ID</th>
            <th><i class="fas fa-user"></i> Name</th>
            <th><i class="fas fa-envelope"></i> Email</th>
            <th><i class="fas fa-user-tag"></i> Role</th>
            <th><i class="fas fa-cogs"></i> Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr>
            <td>1</td>
            <td>
              <div style="display: flex; align-items: center;">
                <div class="user-avatar">A</div>
                Ana Silva
              </div>
            </td>
            <td>ana.silva@email.com</td>
            <td><span class="role-badge role-user">User</span></td>
            <td>
              <div class="action-buttons">
                <button class="btn btn-edit" onclick="editUser(1)">
                  <i class="fas fa-edit"></i> Edit
                </button>
                <button class="btn btn-danger" onclick="deleteUser(1)">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </div>
            </td>
          </tr>
          <tr>
            <td>2</td>
            <td>
              <div style="display: flex; align-items: center;">
                <div class="user-avatar">J</div>
                Juan Pérez
