<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 Profile - World Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="profile-page">
  <div class="container">
    <header>
      <h1>📊 Your Profile</h1>
      <a href="index.html" class="back-btn">← Back to Explorer</a>
    </header>

    <div class="profile-card">
      <div class="profile-avatar">👤</div>
      <h2 id="username">Explorer User</h2>
      <p id="email">banacsean@gmail.com</p>
      
      <div class="profile-stats">
        <div class="stat">
          <span id="savedCount">0</span>
          <small>Saved Countries</small>
        </div>
        <div class="stat">
          <span>100+</span>
          <small>Countries Explored</small>
        </div>
      </div>

      <div class="profile-actions">
        <a href="saved.html" class="btn-primary">📂 View Saved</a>
        <a href="api.html" class="btn-secondary">🌍 Explore More</a>
        <a href="settings.html" class="btn-outline">⚙️ Settings</a>
        <a href="logout.html" class="btn-danger">🚪 Logout</a>
      </div>
    </div>
  </div>

  <script>
    // Update saved count
    const saved = JSON.parse(localStorage.getItem('savedCountries')) || [];
    document.getElementById('savedCount').textContent = saved.length;
  </script>
</body>
</html>
