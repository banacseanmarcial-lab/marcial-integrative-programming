<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Explorer - API Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.2em;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            min-width: 300px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #4facfe;
        }
        button {
            padding: 15px 25px;
            font-size: 16px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #3d9af3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .result {
            display: none;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .country-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 25px;
            border-left: 5px solid #4facfe;
        }
        .flag {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .country-name {
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .info-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .info-label {
            font-size: 0.85em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #2c3e50;
        }
        .error {
            display: none;
            background: #fee;
            border: 2px solid #fcc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #c33;
        }
        .tips {
            background: #e8f4fd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-style: italic;
            color: #666;
        }
        @media (max-width: 600px) {
            .search-box {
                flex-direction: column;
            }
            input[type="text"] {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Country Explorer</h1>
        <p class="subtitle">Enter a country name to see detailed information powered by REST Countries API</p>
        
        <div class="tips">
            💡 Try: "United States", "Japan", "Brazil", "Nigeria", "Germany"
        </div>

        <div class="search-box">
            <input type="text" id="countryInput" placeholder="Type country name and press Enter or click Search">
            <button id="searchBtn">🔍 Search Country</button>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p>Fetching country data...</p>
        </div>

        <div id="error" class="error"></div>

        <div id="result" class="result">
            <div id="countryCard" class="country-card"></div>
        </div>
    </div>

    <script src="api.js"></script>
</body>
</html>
