<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add User - SeanTech Vision</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Navigation */
    nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 1rem 2rem;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    nav h2 {
      color: #4f46e5;
      font-size: 1.8rem;
      font-weight: 700;
      display: inline-block;
      margin-right: 2rem;
    }

    nav h2 i {
      margin-right: 0.5rem;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 2rem;
      float: right;
    }

    nav a {
      text-decoration: none;
      color: #64748b;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 25px;
      transition: all 0.3s ease;
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    nav a:hover {
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.1);
      transform: translateY(-2px);
    }

    nav a[style*="color: #ff6b6b"] {
      color: #ff6b6b !important;
      background: rgba(255, 107, 107, 0.1);
      font-weight: 700;
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
    }

    /* Container */
    .container {
      margin-top: 120px;
      padding: 2rem;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      font-weight: 800;
    }

    header p {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 2rem;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .cta-btn:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.2));
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    /* Form Section */
    .form-section {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 3rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: fadeInUp 1s ease-out 0.2s both;
      position: relative;
      overflow: hidden;
    }

    .form-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899, #f59e0b);
      border-radius: 24px 24px 0 0;
    }

    #addUserForm {
      display: grid;
      gap: 2rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      animation: slideInLeft 0.8s ease-out;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .form-group label {
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 0.75rem;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-group input,
    .form-group select {
      padding: 1.25rem 1.5rem;
      border: 2px solid rgba(79, 70, 229, 0.2);
      border-radius: 16px;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      transform: translateY(-2px);
      background: white;
    }

    .form-group input::placeholder {
      color: #9ca3af;
    }

    /* Submit Button */
    button[type="submit"] {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      padding: 1.5rem 3rem;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button[type="submit"]:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 50px rgba(79, 70, 229, 0.6);
    }

    button[type="submit"]:hover::before {
      transform: scaleX(1);
    }

    button[type="submit"]::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    button[type="submit"]:active {
      transform: translateY(-2px);
    }

    /* Success Message */
    .success-message {
      display: none;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 1.5rem;
      border-radius: 16px;
      margin-top: 2rem;
      text-align: center;
      font-weight: 600;
      animation: slideInUp 0.5s ease-out;
    }

    .success-message.show {
      display: block;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav ul {
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .container {
        padding: 1rem;
        margin-top: 140px;
      }
      
      header h1 {
        font-size: 2.2rem;
      }
      
      .form-section {
        padding: 2rem 1.5rem;
      }
      
      nav h2 {
        display: block;
        text-align: center;
        margin-bottom: 1rem;
        margin-right: 0;
      }
      
      nav ul {
        float: none;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <!-- Navigation Bar -->
  <nav>
    <h2><i class="fas fa-eye"></i> 🌍 World Explorer Hub </h2>
    <ul>
      <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
      <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
      <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
      <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
      <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      <li><a href="admin.html" style="color: #ff6b6b; font-weight: bold;"><i class="fas fa-crown"></i> Admin</a></li>
    </ul>
  </nav>

  <div class="container">
    <header>
      <h1><i class="fas fa-user-plus"></i> Add New User</h1>
      <p>Create a new account with full administrative control</p>
      <a href="admin.html" class="cta-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </header>

    <section class="form-section">
      <form id="addUserForm">
        <div class="form-group">
          <label for="name"><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter full name (e.g., John Doe)" required>
        </div>

        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="email" name="email" placeholder="user@example.com" required>
        </div>

        <div class="form-group">
          <label for="role"><i class="fas fa-user-tag"></i> User Role</label>
          <select id="role" name="role" required>
            <option value="" disabled selected>Select user role</option>
            <option value="User">👤 User</option>
            <option value="Admin">👑 Admin</option>
            <option value="Moderator">🛡️ Moderator</option>
          </select>
        </div>

        <button type="submit" class="cta-btn-primary">
          <i class="fas fa-plus-circle"></i>
          Create User Account
        </button>

        <div class="success-message" id="successMessage">
          <i class="fas fa-check-circle"></i>
          User created successfully! You can now add another user.
        </div>
      </form>
    </section>
  </div>

  <script>
    // Create floating particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = particle.style.height = (Math.random() * 10 + 5) + 'px';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (Math.random() * 20 + 20) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Form handling
    document.getElementById('addUserForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Simulate form submission
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
      submitBtn.disabled = true;
      
      // Simulate API call
      setTimeout(() => {
        document.getElementById('successMessage').classList.add('show');
        submitBtn.innerHTML = '<i class="fas fa-check"></i> User Created!';
        
        setTimeout(() => {
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
          document.getElementById('successMessage').classList.remove('show');
          this.reset();
        }, 2000);
      }, 1500);
    });

    // Input animations
    document.querySelectorAll('input, select').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.02)';
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
      });
    });

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('nav');
      if (window.scrollY > 50) {
        nav.style.background = 'rgba(255, 255, 255, 0.98)';
        nav.style.boxShadow = '0 10px 40px rgba(0, 0, 0, 0.15)';
      } else {
        nav.style.background = 'rgba(255, 255, 255, 0.95)';
        nav.style.boxShadow = '0 8px 32px rgba(0, 0, 0, 0.1)';
      }
    });

    // Intersection Observer for scroll animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.opacity = '1';
          entry.target.style.transform = 'translateY(0)';
        }
      });
    }, { threshold: 0.1 });

    // Observe form section
    document.querySelector('.form-section').style.opacity = '0';
    document.querySelector('.form-section').style.transform = 'translateY(30px)';
    document.querySelector('.form-section').style.transition = 'all 0.6s ease-out';
    observer.observe(document.querySelector('.form-section'));

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
    });

    // Auto-hide success message on click
    document.getElementById('successMessage').addEventListener('click', function() {
      this.classList.remove('show');
    });
  </script>
</body>
</html>
