<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add User - SeanTech Vision</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav>
    <h2>SeanTech Vision</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="settings.html">Settings</a></li>
      <li><a href="logout.html">Logout</a></li>
      <li><a href="admin.html" style="color: #ff6b6b; font-weight: bold;">Admin</a></li>
    </ul>
  </nav>

  <div class="container">
    <header>
      <h1>Add New User</h1>
      <a href="admin.html" class="cta-btn" style="background-color: #555;">Back to Dashboard</a>
    </header>

    <section class="form-section">
      <form id="addUserForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter email address" required>
        </div>

        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" name="role">
            <option value="User">User</option>
            <option value="Admin">Admin</option>
          </select>
        </div>

        <button type="submit" class="cta-btn">Add User</button>
      </form>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
