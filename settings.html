<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚙️ Settings -🌍 World Explorer Hub </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Navigation */
    nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 1rem 2rem;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      animation: slideDown 0.6s ease-out;
      transition: all 0.3s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    nav h2 {
      color: #4f46e5;
      font-size: 1.8rem;
      font-weight: 700;
      display: inline-block;
      margin-right: 2rem;
    }

    nav h2 i { margin-right: 0.5rem; }

    nav ul {
      display: flex;
      list-style: none;
      gap: 2rem;
      float: right;
    }

    nav a {
      text-decoration: none;
      color: #64748b;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 25px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    nav a:hover, nav a.active {
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.1);
      transform: translateY(-2px);
    }

    /* Container */
    .container {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
      padding-top: 120px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header h1 {
      font-size: 3.2rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    /* Settings Card */
    .settings-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      padding: 4rem 3rem;
      box-shadow: 0 35px 80px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      animation: floatIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(50px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .settings-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899);
      border-radius: 32px 32px 0 0;
    }

    /* Form Groups */
    .form-group {
      margin-bottom: 2.5rem;
      position: relative;
      animation: fadeInUp 1s ease-out 0.2s both;
    }

    .form-group:nth-child(even) {
      animation-delay: 0.4s;
    }

    .form-group label {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 1.25rem 1.5rem;
      border: 2px solid rgba(79, 70, 229, 0.1);
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      color: #1f2937;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.95);
    }

    .form-group input::placeholder {
      color: #9ca3af;
    }

    /* Toggle Switch */
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .toggle-switch {
      position: relative;
      width: 60px;
      height: 30px;
      background: #cbd5e1;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .toggle-switch.active {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 50%;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .toggle-switch.active .toggle-knob {
      transform: translateX(30px);
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 3rem;
    }

    .cta-btn, .secondary-btn {
      flex: 1;
      padding: 1.25rem 2rem;
      border: none;
      border-radius: 25px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cta-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
    }

    .cta-btn:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px rgba(79, 70, 229, 0.6);
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
    }

    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    /* Success Message */
    .success-message {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 1rem 2rem;
      border-radius: 20px;
      margin-bottom: 2rem;
      display: none;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 2rem 1rem;
        padding-top: 140px;
      }
      
      .settings-card {
        padding: 3rem 2rem;
        margin: 1rem;
      }
      
      .button-group {
        flex-direction: column;
      }
      
      nav ul {
        gap: 1rem;
        flex-wrap: wrap;
      }
      
      .header h1 {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <!-- Navigation Bar -->
  <nav>
    <h2><i class="fas fa-eye"></i> SeanTech Vision</h2>
    <ul>
      <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
      <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
      <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
      <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> Settings</a></li>
      <li><a href="saved.html"><i class="fas fa-folder-open"></i> Saved</a></li>
      <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="header">
      <h1><i class="fas fa-cog"></i> Settings</h1>
      <p>Customize your SeanTech Vision experience</p>
    </div>

    <div class="settings-card">
      <div id="successMessage" class="success-message">
        <i class="fas fa-check-circle"></i>
        Settings saved successfully!
      </div>

      <form id="settingsForm">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="email" placeholder="banacsean@gmail.com" value="banacsean@gmail.com">
        </div>

        <div class="form-group">
          <label><i class="fas fa-map-marker-alt"></i> Address</label>
          <input type="text" id="address" placeholder="Enter your address">
        </div>

        <div class="form-group">
          <label><i class="fas fa-lock"></i> New Password</label>
          <input type="password" id="password" placeholder="Leave empty to keep current">
        </div>

        <div class="form-group">
          <label><i class="fas fa-palette"></i> Theme</label>
          <select id="theme">
            <option value="light" selected>Light</option>
            <option value="dark">Dark</option>
            <option value="auto">Auto (System)</option>
          </select>
        </div>

        <div class="form-group">
          <label><i class="fas fa-bell"></i> Notifications</label>
          <div class="toggle-container">
            <span>Enabled</span>
            <div class="toggle-switch" id="notificationsToggle">
              <div class="toggle-knob"></div>
            </div>
            <span>Disabled</span>
          </div>
        </div>

        <div class="button-group">
          <button type="submit" class="cta-btn">
            <i class="fas fa-save"></i>
            Save Changes
          </button>
          <a href="profile.html" class="secondary-btn">
            <i class="fas fa-arrow-left"></i>
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Create floating particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 60; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = particle.style.height = (Math.random() * 10 + 4) + 'px';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (Math.random() * 20 + 25) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Toggle switch functionality
    const toggleSwitch = document.getElementById('notificationsToggle');
    toggleSwitch.addEventListener('click', () => {
      toggleSwitch.classList.toggle('active');
    });

    // Load saved settings
    function loadSettings() {
      const settings = JSON.parse(localStorage.getItem('userSettings')) || {};
      document.getElementById('email').value = settings.email || 'banacsean@gmail.com';
      document.getElementById('address').value = settings.address || '';
      document.getElementById('theme').value = settings.theme || 'light';
      
      // Load notifications toggle
      if (settings.notifications !== false) {
        toggleSwitch.classList.add('active');
      }
    }

    // Save settings
    document.getElementById('settingsForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const settings = {
        email: document.getElementById('email').value,
        address: document.getElementById('address').value,
        password: document.getElementById('password').value || null,
        theme: document.getElementById('theme').value,
        notifications: toggleSwitch.classList.contains('active')
      };

      localStorage.setItem('userSettings', JSON.stringify(settings));
      
      // Show success message
      const successMsg = document.getElementById('successMessage');
      successMsg.style.display = 'block';
      setTimeout(() => {
        successMsg.style.display = 'none';
      }, 3000);
    });

    // Initialize
    createParticles();
    loadSettings();
  </script>
</body>
</html>
