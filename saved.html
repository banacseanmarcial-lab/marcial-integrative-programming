<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 Saved Countries - 🌍 World Explorer Hub </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Navigation */
    nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 1rem 2rem;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      animation: slideDown 0.6s ease-out;
      transition: all 0.3s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    nav h2 {
      color: #4f46e5;
      font-size: 1.8rem;
      font-weight: 700;
      display: inline-block;
      margin-right: 2rem;
    }

    nav h2 i { margin-right: 0.5rem; }

    nav ul {
      display: flex;
      list-style: none;
      gap: 2rem;
      float: right;
    }

    nav a {
      text-decoration: none;
      color: #64748b;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 25px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    nav a:hover {
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.1);
      transform: translateY(-2px);
    }

    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
      padding-top: 120px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header h1 {
      font-size: 3.5rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .header p {
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      font-size: 1.1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-top: 1rem;
    }

    .back-btn:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.2));
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    /* Stats */
    .stats {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out 0.3s both;
    }

    .stat {
      text-align: center;
      color: white;
    }

    .stat span {
      display: block;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #059669);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat small {
      font-size: 0.9rem;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Countries Grid */
    .countries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.8);
      animation: fadeInUp 1s ease-out;
    }

    .empty-state i {
      font-size: 6rem;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 1.5rem;
    }

    .empty-state h3 {
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Country Card */
    .country-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: cardSlideIn 0.6s ease-out forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    .country-card:nth-child(odd) { animation-delay: 0.1s; }
    .country-card:nth-child(even) { animation-delay: 0.2s; }

    @keyframes cardSlideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .country-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
    }

    .country-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #10b981);
      border-radius: 24px 24px 0 0;
    }

    .country-flag {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .country-card:hover .country-flag {
      transform: scale(1.02);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
    }

    .country-name {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1f2937;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #1f2937, #374151);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .country-info {
      display: grid;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .country-info p {
      font-size: 1.1rem;
      color: #6b7280;
      font-weight: 500;
    }

    .country-info strong {
      color: #374151;
      font-weight: 700;
    }

    .remove-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .remove-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(239, 68, 68, 0.4);
    }

    .remove-btn:active {
      transform: translateY(0);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .countries-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      
      .stats {
        flex-direction: column;
        gap: 1.5rem;
        align-items: center;
      }
      
      .header h1 {
        font-size: 2.8rem;
      }
      
      nav ul {
        gap: 1rem;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <!-- Navigation Bar -->
  <nav>
    <h2><i class="fas fa-eye"></i> SeanTech Vision</h2>
    <ul>
      <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
      <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
      <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
      <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
      <li><a href="saved.html"><i class="fas fa-folder-open"></i> Saved</a></li>
      <li><a href="admin.html" style="color: #ff6b6b; font-weight: bold;"><i class="fas fa-crown"></i> Admin</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="header">
      <h1><i class="fas fa-folder-open"></i> Saved Countries</h1>
      <p>Your favorite countries collection</p>
      <a href="profile.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
        Back to Profile
      </a>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <span id="savedCount">0</span>
        <small>Total Saved</small>
      </div>
      <div class="stat">
        <span id="uniqueRegions">0</span>
        <small>Regions</small>
      </div>
    </div>

    <div class="countries-grid" id="savedList"></div>
  </div>

  <script>
    // Create floating particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 60; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = particle.style.height = (Math.random() * 10 + 4) + 'px';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (Math.random() * 20 + 25) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Animate counters
    function animateCounter(element, target, duration = 2000) {
      let start = 0;
      const increment = target / (duration / 16);
      
      const updateCounter = () => {
        if (start < target) {
          start += increment;
          element.textContent = Math.floor(start);
          requestAnimationFrame(updateCounter);
        } else {
          element.textContent = target;
        }
      };
      updateCounter();
    }

    function loadSaved() {
      let saved = JSON.parse(localStorage.getItem("savedCountries")) || [];
      const container = document.getElementById("savedList");
      const savedCountEl = document.getElementById("savedCount");
      
      // Update saved count with animation
      animateCounter(savedCountEl, saved.length);

      // Calculate unique regions
      const uniqueRegions = new Set(saved.map(item => item.region)).size;
      document.getElementById("uniqueRegions").textContent = uniqueRegions;

      container.innerHTML = "";

      if (saved.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-folder-open"></i>
            <h3>No Saved Countries</h3>
            <p>Start exploring countries and save your favorites to see them here.</p>
            <a href="index.html" class="back-btn" style="margin-top: 2rem; display: inline-block;">
              <i class="fas fa-globe"></i> Explore Countries
            </a>
          </div>
        `;
        return;
      }

      saved.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "country-card";
  div.style.animationDelay = `${index * 0.1}s`;
  div.innerHTML = `
    <img src="${item.flag}" class="country-flag" alt="${item.name} flag" onerror="this.src='https://via.placeholder.com/300x140/4f46e5/ffffff?text=${encodeURIComponent(item.name)}'">
    <h2 class="country-name">${item.name}</h2>
    <div class="country-info">
      <p><strong><i class="fas fa-landmark"></i> Capital:</strong> ${item.capital || 'N/A'}</p>
      <p><strong><i class="fas fa-users"></i> Population:</strong> ${item.population ? item.population.toLocaleString() : 'N/A'}</p>
      <p><strong><i class="fas fa-globe"></i> Region:</strong> ${item.region || 'N/A'}</p>
    </div>
    <button class="remove-btn" onclick="removeCountry('${item.name.replace(/'/g, "\\'")}')">
      <i class="fas fa-trash"></i> Remove
    </button>
  `;
  container.appendChild(div);
});
    }

    function removeCountry(name) {
      let saved = JSON.parse(localStorage.getItem("savedCountries")) || [];
      saved = saved.filter(item => item.name !== name);
      localStorage.setItem("savedCountries", JSON.stringify(saved));
      loadSaved();
    }

    createParticles();
    loadSaved();
  </script>
