<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saved Countries</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f6f9; }
    .country-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: white; }
    .flag { width: 80px; height: 50px; object-fit: cover; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>🌍 Saved Countries</h1>
  <div id="savedList"></div>

  <script>
    function loadSaved() {
      let saved = JSON.parse(localStorage.getItem("savedCountries")) || [];
      const container = document.getElementById("savedList");
      container.innerHTML = "";

      if (saved.length === 0) {
        container.innerHTML = "<p>No saved countries yet.</p>";
        return;
      }

      saved.forEach(item => {
        const div = document.createElement("div");
        div.className = "country-card";
        div.innerHTML = `
          <img src="${item.flag}" class="flag">
          <h2>${item.name}</h2>
          <p><strong>Capital:</strong> ${item.capital}</p>
          <p><strong>Region:</strong> ${item.region}</p>
          <button onclick="removeCountry('${item.name}')">❌ Remove</button>
        `;
        container.appendChild(div);
      });
    }

    function removeCountry(name) {
      let saved = JSON.parse(localStorage.getItem("savedCountries")) || [];
      saved = saved.filter(item => item.name !== name);
      localStorage.setItem("savedCountries", JSON.stringify(saved));
      loadSaved();
    }

    loadSaved();
  </script>
</body>
</html>
