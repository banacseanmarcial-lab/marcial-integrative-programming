<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 Sign Up - 🌍 World Explorer Hub </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Auth Container */
    .auth-container {
      max-width: 450px;
      width: 100%;
      position: relative;
      z-index: 10;
    }

    /* Auth Card */
    .auth-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(40px);
      border-radius: 32px;
      padding: 4rem 3rem;
      text-align: center;
      box-shadow: 0 35px 80px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      animation: floatIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: scale(0.7) translateY(50px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899);
      border-radius: 32px 32px 0 0;
    }

    /* Logo/Icon */
    .auth-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 3rem;
      color: white;
      box-shadow: 0 20px 50px rgba(79, 70, 229, 0.4);
      animation: logoFloat 3s ease-in-out infinite;
      border: 4px solid rgba(255, 255, 255, 0.3);
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }

    /* Header */
    .auth-card h1 {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #1f2937, #374151);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .auth-card p {
      color: #6b7280;
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 3rem;
    }

    /* Form */
    #signupForm {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      position: relative;
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group input {
      width: 100%;
      padding: 1.5rem 1.75rem;
      border: 2px solid rgba(79, 70, 229, 0.1);
      border-radius: 25px;
      font-size: 1.1rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      color: #1f2937;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
    }

    .form-group input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1), 0 15px 40px rgba(79, 70, 229, 0.2);
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.95);
    }

    .form-group input::placeholder {
      color: #9ca3af;
      font-weight: 500;
    }

    /* Submit Button */
    #signupForm button {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      padding: 1.5rem 3rem;
      border-radius: 25px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      margin-top: 1rem;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    #signupForm button:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px rgba(79, 70, 229, 0.6);
    }

    #signupForm button:active {
      transform: translateY(-4px);
    }

    /* Button shimmer effect */
    #signupForm button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.6s;
    }

    #signupForm button:hover::before {
      left: 100%;
    }

    /* Auth Links */
    .auth-links {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-top: 2.5rem;
    }

    .auth-links a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      padding: 1rem 2rem;
      border-radius: 25px;
      background: rgba(79, 70, 229, 0.1);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(79, 70, 229, 0.2);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .auth-links a:hover {
      background: rgba(79, 70, 229, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.3);
    }

    /* Loading Spinner */
    .loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid white;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin-right: 0.75rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Success/Error Messages */
    .message {
      padding: 1rem 2rem;
      border-radius: 20px;
      margin: 1.5rem 0;
      font-weight: 600;
      display: none;
      animation: slideIn 0.5s ease-out;
    }

    .success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        padding: 3rem 2rem;
        margin: 1rem;
      }
      
      .auth-card h1 {
        font-size: 2.3rem;
      }
      
      .auth-links {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-globe"></i>
      </div>
      
      <h1><i class="fas fa-user-plus"></i> Join SeanTech Vision</h1>
      <p>Create your account to save favorite countries and unlock premium features</p>
      
      <div id="messageContainer"></div>

      <form id="signupForm">
        <div class="form-group">
          <input type="text" id="username" placeholder="👤 Enter your username" required>
        </div>
        
        <div class="form-group">
          <input type="email" id="email" placeholder="📧 Enter your email" required>
        </div>
        
        <div class="form-group">
          <input type="password" id="password" placeholder="🔒 Create a password (8+ characters)" required minlength="8">
        </div>
        
        <button type="submit" id="submitBtn">
          <span id="btnText">Create Account</span>
          <div id="spinner" class="spinner" style="display: none;"></div>
        </button>
      </form>

      <div class="auth-links">
        <a href="login.html">
          <i class="fas fa-sign-in-alt"></i>
          Already have an account? Login
        </a>
        <a href="index.html">
          <i class="fas fa-arrow-left"></i>
          Back to Home
        </a>
      </div>
    </div>
  </div>

  <script>
    // Create floating particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = particle.style.height = (Math.random() * 8 + 3) + 'px';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (Math.random() * 15 + 20) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Show message function
    function showMessage(message, type) {
      const container = document.getElementById('messageContainer');
      container.innerHTML = `
        <div class="message ${type}">
          <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
          ${message}
        </div>
      `;
    }

    // Form submission
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      // Validation
      if (username.length < 3) {
        showMessage('Username must be at least 3 characters long', 'error');
        return;
      }
      
      if (!email.includes('@') || !email.includes('.')) {
        showMessage('Please enter a valid email address', 'error');
        return;
      }
      
      if (password.length < 8) {
        showMessage('Password must be at least 8 characters long', 'error');
        return;
      }
      
      // Show loading state
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      
      submitBtn.classList.add('loading');
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      
      // Simulate API call
      setTimeout(() => {
        // Save user data
        const userData = {
          username,
          email,
          joined: new Date().toLocaleDateString()
        };
        
        localStorage.setItem('currentUser', JSON.stringify(userData));
        localStorage.setItem('isLoggedIn', 'true');
        
        // Show success and redirect
        showMessage('Account created successfully! 🎉 Redirecting...', 'success');
        
        setTimeout(() => {
          window.location.href = 'profile.html';
        }, 1500);
      }, 2000);
    });

    // Initialize
    createParticles();
  </script>
</body>
</html>
